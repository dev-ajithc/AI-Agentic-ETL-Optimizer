name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install ruff mypy pydantic-settings

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy config.py db/ agent/ compliance/ validation/ logging_config.py
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit static analysis
        run: bandit -r . -x tests/,venv/ -ll

      - name: pip-audit dependency scan
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      SQLITE_PATH: data/test.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Create data directory
        run: mkdir -p data logs exports

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=. \
            --cov-omit=tests/*,*/migrations/* \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-etl-optimizer:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -p 8501:8501 \
            --name smoke_test \
            ai-etl-optimizer:${{ github.sha }}
          sleep 15
          docker logs smoke_test
          docker stop smoke_test
